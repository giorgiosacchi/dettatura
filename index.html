<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>Dettatura vocale - versione severa</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f172a;
      --muted:#6b7280;
      --text:#e5e7eb;
      --accent:#0ea5e9;
      --accent-2:#22c55e;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:linear-gradient(180deg,#0b1220 0%,#0a0f1a 100%);
      color:var(--text);
      display:flex; flex-direction:column; gap:12px;
    }
    header{padding:16px 20px 0}
    h1{font-size:20px; font-weight:700; margin:0 0 6px}
    p.sub{margin:0; color:var(--muted); font-size:14px}
    .card{
      background:rgba(15,23,42,.7);
      backdrop-filter:blur(8px);
      border:1px solid rgba(148,163,184,.15);
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      margin:10px 14px;
      padding:14px;
    }
    .controls{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    select, button, .pill{
      font-size:16px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.2);
      background:#0b1530;
      color:var(--text);
      padding:10px 14px;
    }
    button{cursor:pointer}
    button:disabled{opacity:.6; cursor:not-allowed}
    .micBtn{
      flex:1 1 auto;
      display:flex; align-items:center; justify-content:center; gap:10px;
      font-weight:700; padding:16px; font-size:18px;
      background:linear-gradient(180deg,#0ea5e9,#0284c7);
      border:none; color:white; border-radius:16px;
      box-shadow:0 10px 20px rgba(2,132,199,.35);
      transition:transform .06s ease, box-shadow .2s ease, background .2s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .micBtn:active{transform:scale(.98)}
    .micBtn.listening{
      background:linear-gradient(180deg,#22c55e,#16a34a);
      box-shadow:0 10px 22px rgba(34,197,94,.35);
    }
    .status{font-size:14px; color:var(--muted)}
    .transcript{
      min-height:30vh; max-height:45vh; overflow:auto;
      background:#0b1220; border-radius:12px; padding:12px;
      border:1px dashed rgba(148,163,184,.25);
      line-height:1.6; font-size:18px;
      white-space:pre-wrap; word-break:break-word;
    }
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .grid button{width:100%}
    .note{font-size:13px; color:var(--muted); margin-top:10px}
    footer{padding:0 20px 18px; color:var(--muted); font-size:12px}
    code{background:#111827; padding:2px 6px; border-radius:8px}
    @media (min-width:700px){body{max-width:760px; margin:0 auto}}
  </style>
</head>
<body>
  <header>
    <h1>Dettatura vocale - versione severa</h1>
    <p class="sub">Più prudente contro i raddoppi: niente testo intermedio visibile e filtro aggressivo sulle sovrapposizioni.</p>
  </header>

  <section class="card">
    <div class="controls">
      <button id="mic" class="micBtn" aria-pressed="false">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm6-3a6 6 0 0 1-12 0M12 19v3" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="micLabel">Avvia dettatura</span>
      </button>
      <div class="row" style="flex:1 1 100%">
        <label for="lang" class="pill" style="background:transparent; border:none; padding-left:0">Lingua:</label>
        <select id="lang" aria-label="Lingua riconoscimento">
          <option value="it-IT" selected>Italiano (Italia)</option>
          <option value="en-US">English (US)</option>
          <option value="es-ES">Español (España)</option>
          <option value="fr-FR">Français (France)</option>
          <option value="de-DE">Deutsch (Deutschland)</option>
        </select>
        <label class="pill" style="display:flex; gap:8px; align-items:center; background:transparent; border:none">
          <input type="checkbox" id="continuous" checked aria-label="Dettatura continua"/> Continua
        </label>
      </div>
      <div class="status" id="status">Pronto.</div>
    </div>
    <div class="note">Modalità severa: il testo viene aggiunto solo quando il motore lo considera finale.</div>
  </section>

  <section class="card">
    <div id="output" class="transcript" role="region" aria-live="polite" aria-label="Trascrizione"></div>
    <div class="grid" style="margin-top:12px">
      <button id="copyBtn">Copia</button>
      <button id="clearBtn">Pulisci</button>
      <button id="saveBtn">Salva .txt</button>
      <button id="stopBtn">Ferma</button>
    </div>
  </section>

  <footer>
    <div id="supportNote"></div>
  </footer>

  <script>
    (function(){
      const output = document.getElementById('output');
      const micBtn = document.getElementById('mic');
      const micLabel = document.getElementById('micLabel');
      const statusEl = document.getElementById('status');
      const copyBtn = document.getElementById('copyBtn');
      const clearBtn = document.getElementById('clearBtn');
      const saveBtn = document.getElementById('saveBtn');
      const stopBtn = document.getElementById('stopBtn');
      const langSel = document.getElementById('lang');
      const contCk = document.getElementById('continuous');
      const supportNote = document.getElementById('supportNote');

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recog = null;
      let listening = false;
      let shouldRestart = false;
      let restartTimer = null;
      let finalText = '';
      let lastFinalNorm = '';
      let recentlyAccepted = [];

      try{
        const savedLang = localStorage.getItem('sr_lang');
        if(savedLang) langSel.value = savedLang;
        const savedCont = localStorage.getItem('sr_cont');
        if(savedCont!==null) contCk.checked = savedCont === '1';
      }catch(e){}

      function setStatus(msg){ statusEl.textContent = msg; }
      function render(){
        output.textContent = finalText;
        output.scrollTop = output.scrollHeight;
      }
      function setUI(on){
        listening = on;
        micBtn.classList.toggle('listening', on);
        micBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
        micLabel.textContent = on ? 'Sto ascoltando…' : 'Avvia dettatura';
      }

      function normalizeSpaces(s){
        return s.replace(/\s+/g,' ').trim();
      }
      function normalizeCompare(s){
        return normalizeSpaces(s)
          .toLowerCase()
          .replace(/[.,;:!?]+/g,'')
          .replace(/\s+/g,' ')
          .trim();
      }
      function words(s){
        return normalizeCompare(s).split(' ').filter(Boolean);
      }
      function wordOverlap(a, b){
        const wa = words(a);
        const wb = words(b);
        const max = Math.min(wa.length, wb.length);
        for(let k = max; k >= 1; k--){
          let ok = true;
          for(let i = 0; i < k; i++){
            if(wa[wa.length - k + i] !== wb[i]){ ok = false; break; }
          }
          if(ok) return k;
        }
        return 0;
      }
      function mergeByOverlap(existing, incoming){
        const cleanExisting = normalizeSpaces(existing);
        const cleanIncoming = normalizeSpaces(incoming);
        if(!cleanIncoming) return cleanExisting;
        if(!cleanExisting) return cleanIncoming;

        const normExisting = normalizeCompare(cleanExisting);
        const normIncoming = normalizeCompare(cleanIncoming);

        if(normExisting === normIncoming) return cleanExisting;
        if(normExisting.endsWith(normIncoming)) return cleanExisting;
        if(normExisting.includes(normIncoming)) return cleanExisting;

        const overlap = wordOverlap(cleanExisting, cleanIncoming);
        if(overlap > 0){
          const incomingWordsOriginal = normalizeSpaces(cleanIncoming).split(/\s+/);
          const tail = incomingWordsOriginal.slice(overlap).join(' ');
          return tail ? (cleanExisting + ' ' + tail) : cleanExisting;
        }

        return cleanExisting + ' ' + cleanIncoming;
      }
      function isMostlyCovered(newText){
        const normNew = normalizeCompare(newText);
        if(!normNew) return true;
        if(lastFinalNorm && (lastFinalNorm === normNew || lastFinalNorm.includes(normNew) || normNew.includes(lastFinalNorm))) return true;
        return recentlyAccepted.some(x => x === normNew || x.includes(normNew) || normNew.includes(x));
      }
      function acceptChunk(text){
        const clean = normalizeSpaces(text);
        if(!clean) return false;
        if(isMostlyCovered(clean)) return false;

        const merged = mergeByOverlap(finalText, clean);
        const beforeNorm = normalizeCompare(finalText);
        const afterNorm = normalizeCompare(merged);
        if(beforeNorm === afterNorm) return false;

        finalText = merged;
        lastFinalNorm = normalizeCompare(clean);
        recentlyAccepted.push(lastFinalNorm);
        if(recentlyAccepted.length > 8) recentlyAccepted.shift();
        render();
        return true;
      }

      function createRecognizer(){
        const r = new SR();
        r.lang = langSel.value;
        r.continuous = contCk.checked;
        r.interimResults = false; // severa: niente intermedi
        r.maxAlternatives = 1;
        return r;
      }

      function bindRecognizer(r){
        r.onstart = () => setStatus('In ascolto…');
        r.onaudiostart = () => setStatus('Audio rilevato…');
        r.onspeechstart = () => setStatus('Parla pure.');
        r.onspeechend = () => setStatus('Pausa…');
        r.onresult = (evt) => {
          let acceptedAny = false;
          for(let i = evt.resultIndex; i < evt.results.length; i++){
            const res = evt.results[i];
            const text = (res[0] && res[0].transcript ? res[0].transcript : '').trim();
            if(res.isFinal){
              acceptedAny = acceptChunk(text) || acceptedAny;
            }
          }
          if(acceptedAny) setStatus('Testo aggiunto.');
        };
        r.onerror = (evt) => {
          const m = evt.error === 'no-speech' ? 'Nessuna voce rilevata.' :
                    evt.error === 'not-allowed' ? 'Permesso microfono negato.' :
                    evt.error === 'aborted' ? 'Interrotto.' :
                    `Errore: ${evt.error || 'sconosciuto'}`;
          setStatus(m);
        };
        r.onend = () => {
          if(shouldRestart && contCk.checked){
            clearTimeout(restartTimer);
            restartTimer = setTimeout(() => {
              try{
                recog = createRecognizer();
                bindRecognizer(recog);
                recog.start();
              }catch(e){
                setUI(false);
                setStatus('Terminato.');
              }
            }, 350);
            return;
          }
          setUI(false);
          setStatus('Terminato.');
        };
      }

      function start(){
        if(!SR){
          setStatus('Riconoscimento vocale non supportato su questo browser.');
          supportNote.innerHTML = 'Suggerimento: usa <b>Google Chrome</b> su Android.';
          return;
        }
        if(listening) return;
        shouldRestart = true;
        clearTimeout(restartTimer);
        recog = createRecognizer();
        bindRecognizer(recog);
        try{
          setUI(true);
          setStatus('Richiesta autorizzazione microfono…');
          recog.start();
        }catch(err){
          shouldRestart = false;
          setUI(false);
          setStatus('Errore avvio: ' + (err.message || err.name || err));
        }
      }

      function stop(){
        shouldRestart = false;
        clearTimeout(restartTimer);
        if(recog){ try{ recog.stop(); }catch(e){} }
        setUI(false);
        setStatus('Inattivo.');
      }

      micBtn.addEventListener('click', start);
      stopBtn.addEventListener('click', stop);

      langSel.addEventListener('change', () => {
        try{ localStorage.setItem('sr_lang', langSel.value); }catch(e){}
        if(listening){ stop(); setTimeout(start, 300); }
      });
      contCk.addEventListener('change', () => {
        try{ localStorage.setItem('sr_cont', contCk.checked ? '1' : '0'); }catch(e){}
      });

      copyBtn.addEventListener('click', async () => {
        const text = finalText.trim();
        if(!text){ setStatus('Nulla da copiare.'); return; }
        try{
          await navigator.clipboard.writeText(text);
          setStatus('Copiato negli appunti.');
        }catch(e){
          setStatus('Impossibile copiare automaticamente.');
        }
      });

      clearBtn.addEventListener('click', () => {
        finalText = '';
        lastFinalNorm = '';
        recentlyAccepted = [];
        render();
        setStatus('Pulito.');
      });

      saveBtn.addEventListener('click', () => {
        const text = finalText.trim();
        const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
        const a = document.createElement('a');
        const ts = new Date().toISOString().replace(/[:.]/g,'-');
        a.href = URL.createObjectURL(blob);
        a.download = `dettatura-severa-${ts}.txt`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus('File salvato.');
      });

      if(!SR){
        supportNote.innerHTML = '⚠️ Il tuo browser non espone il <code>Web Speech API</code>. Prova con Chrome su Android.';
      } else {
        supportNote.textContent = 'Questa versione sacrifica un po’ di immediatezza per ridurre le ripetizioni.';
      }
    })();
  </script>
</body>
</html>
