<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>Dettatura vocale (smartphone/tablet)</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f172a;
      --muted:#6b7280;
      --text:#e5e7eb;
      --accent:#0ea5e9;
      --accent-2:#22c55e;
      --danger:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:linear-gradient(180deg, #0b1220 0%, #0a0f1a 100%);
      color:var(--text);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    header{padding:16px 20px 0}
    h1{font-size:20px; font-weight:700; margin:0 0 6px}
    p.sub{margin:0; color:var(--muted); font-size:14px}
    .card{
      background:rgba(15,23,42,.7);
      backdrop-filter: blur(8px);
      border:1px solid rgba(148,163,184,.15);
      border-radius:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      margin: 10px 14px;
      padding: 14px;
    }
    .controls{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .row{display:flex; gap:10px; align-items:center}
    select, button, .pill{
      font-size:16px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.2);
      background:#0b1530;
      color:var(--text);
      padding:10px 14px;
    }
    select{background:#0a1530}
    button{cursor:pointer}
    button:disabled{opacity:.6; cursor:not-allowed}
    .micBtn{
      flex:1 1 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:700;
      padding:16px;
      font-size:18px;
      background:linear-gradient(180deg, #0ea5e9, #0284c7);
      border:none;
      color:white;
      border-radius:16px;
      box-shadow: 0 10px 20px rgba(2,132,199,.35);
      transition: transform .06s ease, box-shadow .2s ease, background .2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .micBtn:active{ transform: scale(.98) }
    .micBtn.listening{
      background: linear-gradient(180deg, #22c55e, #16a34a);
      box-shadow: 0 10px 22px rgba(34,197,94,.35);
    }
    .status{font-size:14px; color:var(--muted)}
    .transcript{
      min-height: 30vh;
      max-height: 45vh;
      overflow:auto;
      background:#0b1220;
      border-radius:12px;
      padding:12px;
      border:1px dashed rgba(148,163,184,.25);
      line-height:1.6;
      font-size:18px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .grid button{width:100%}
    footer{padding: 0 20px 18px; color:var(--muted); font-size:12px}
    @media (min-width:700px){
      body{max-width:760px; margin:0 auto}
    }
  </style>
</head>
<body>
  <header>
    <h1>Dettatura vocale</h1>
    <p class="sub">Tocca il microfono e parla. Funziona al meglio su Android/Chrome. iOS Safari può non supportare il riconoscimento.</p>
  </header>

  <section class="card">
    <div class="controls">
      <button id="mic" class="micBtn" aria-pressed="false">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm6-3a6 6 0 0 1-12 0M12 19v3" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="micLabel">Avvia dettatura</span>
      </button>
      <div class="row" style="flex:1 1 100%; flex-wrap:wrap">
        <label for="lang" class="pill" style="background:transparent; border:none; padding-left:0">Lingua:</label>
        <select id="lang" aria-label="Lingua riconoscimento">
          <option value="it-IT" selected>Italiano (Italia)</option>
          <option value="en-US">English (US)</option>
          <option value="es-ES">Español (España)</option>
          <option value="fr-FR">Français (France)</option>
          <option value="de-DE">Deutsch (Deutschland)</option>
        </select>
        <label class="pill" style="display:flex; gap:8px; align-items:center; background:transparent; border:none">
          <input type="checkbox" id="continuous" checked aria-label="Dettatura continua"/> Continua
        </label>
        <label class="pill" style="display:flex; gap:8px; align-items:center; background:transparent; border:none">
          <input type="checkbox" id="interim" checked aria-label="Mostra risultati intermedi"/> Intermedio
        </label>
      </div>
      <div class="status" id="status">Pronto.</div>
    </div>
  </section>

  <section class="card">
    <div id="output" class="transcript" role="region" aria-live="polite" aria-label="Trascrizione"></div>
    <div class="grid" style="margin-top:12px">
      <button id="copyBtn" title="Copia negli appunti">Copia</button>
      <button id="clearBtn" title="Svuota trascrizione">Pulisci</button>
      <button id="saveBtn" title="Salva come .txt">Salva .txt</button>
      <button id="stopBtn" title="Ferma dettatura">Ferma</button>
    </div>
  </section>

  <footer>
    <div id="supportNote"></div>
  </footer>

  <script>
    (function(){
      const output = document.getElementById('output');
      const micBtn = document.getElementById('mic');
      const micLabel = document.getElementById('micLabel');
      const statusEl = document.getElementById('status');
      const copyBtn = document.getElementById('copyBtn');
      const clearBtn = document.getElementById('clearBtn');
      const saveBtn = document.getElementById('saveBtn');
      const stopBtn = document.getElementById('stopBtn');
      const langSel = document.getElementById('lang');
      const interimCk = document.getElementById('interim');
      const contCk = document.getElementById('continuous');
      const supportNote = document.getElementById('supportNote');

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recog = null;
      let listening = false;
      let shouldRestart = false;
      let finalText = '';
      let interimText = '';
      let lastFinalChunk = '';

      try{
        const savedLang = localStorage.getItem('sr_lang');
        if(savedLang) langSel.value = savedLang;
        const savedInterim = localStorage.getItem('sr_interim');
        if(savedInterim !== null) interimCk.checked = savedInterim === '1';
        const savedCont = localStorage.getItem('sr_cont');
        if(savedCont !== null) contCk.checked = savedCont === '1';
      }catch(e){}

      function renderOutput(){
        const sep = finalText && interimText && !/\s$/.test(finalText) ? ' ' : '';
        output.textContent = finalText + sep + interimText;
        output.scrollTop = output.scrollHeight;
      }

      function setStatus(msg){ statusEl.textContent = msg; }

      function setUI(listen){
        listening = listen;
        micBtn.classList.toggle('listening', listen);
        micBtn.setAttribute('aria-pressed', listen ? 'true' : 'false');
        micLabel.textContent = listen ? 'Sto ascoltando…' : 'Avvia dettatura';
      }

      function appendFinal(text){
        const clean = (text || '').trim();
        if(!clean) return;

        if(clean === lastFinalChunk) return;

        if(finalText && !/\s$/.test(finalText)) finalText += ' ';
        finalText += clean;
        lastFinalChunk = clean;
        interimText = '';
        renderOutput();
      }

      function createRecognizer(){
        if(!SR) return null;
        const r = new SR();
        r.lang = langSel.value;
        r.continuous = contCk.checked;
        r.interimResults = interimCk.checked;
        r.maxAlternatives = 1;
        return r;
      }

      function bindRecognizer(r){
        r.onstart = () => setStatus('In ascolto…');
        r.onaudiostart = () => setStatus('Audio rilevato…');
        r.onspeechstart = () => setStatus('Parla pure.');
        r.onspeechend = () => setStatus('Pausa…');
        r.onaudioend = () => setStatus('Audio terminato.');

        r.onresult = (evt) => {
          let newInterim = '';

          for(let i = evt.resultIndex; i < evt.results.length; i++){
            const res = evt.results[i];
            const text = (res[0] && res[0].transcript ? res[0].transcript : '').trim();

            if(res.isFinal){
              appendFinal(text);
            } else if(interimCk.checked && text){
              newInterim += (newInterim ? ' ' : '') + text;
            }
          }

          interimText = newInterim;
          renderOutput();
        };

        r.onerror = (evt) => {
          const m = evt.error === 'no-speech' ? 'Nessuna voce rilevata.' :
                    evt.error === 'not-allowed' ? 'Permesso microfono negato.' :
                    evt.error === 'aborted' ? 'Interrotto.' :
                    `Errore: ${evt.error || 'sconosciuto'}`;
          setStatus(m);
        };

        r.onend = () => {
          if(shouldRestart && contCk.checked){
            try{
              recog = createRecognizer();
              bindRecognizer(recog);
              recog.start();
              return;
            }catch(e){}
          }
          setUI(false);
          interimText = '';
          renderOutput();
          setStatus('Terminato.');
        };
      }

      function start(){
        if(!SR){
          setStatus('Riconoscimento vocale non supportato su questo browser.');
          supportNote.innerHTML = 'Suggerimento: usa <b>Google Chrome</b> su Android. Su iPhone/iPad, Safari in genere non supporta il Web Speech API.';
          return;
        }
        if(listening) return;

        shouldRestart = true;
        recog = createRecognizer();
        if(!recog){
          setStatus('Impossibile iniziare il riconoscimento.');
          return;
        }
        bindRecognizer(recog);

        try{
          setUI(true);
          setStatus('Richiesta autorizzazione microfono…');
          recog.start();
        }catch(err){
          console.error(err);
          setUI(false);
          shouldRestart = false;
          setStatus('Errore avvio: ' + (err.message || err.name || err));
        }
      }

      function stop(){
        shouldRestart = false;
        if(recog){ try{ recog.stop(); }catch(e){} }
        setUI(false);
        interimText = '';
        renderOutput();
        setStatus('Inattivo.');
      }

      micBtn.addEventListener('click', start);
      stopBtn.addEventListener('click', stop);

      langSel.addEventListener('change', () => {
        try{ localStorage.setItem('sr_lang', langSel.value); }catch(e){}
        if(listening){
          stop();
          setTimeout(start, 80);
        }
      });
      interimCk.addEventListener('change', ()=>{ try{ localStorage.setItem('sr_interim', interimCk.checked ? '1' : '0'); }catch(e){} });
      contCk.addEventListener('change', ()=>{ try{ localStorage.setItem('sr_cont', contCk.checked ? '1' : '0'); }catch(e){} });

      copyBtn.addEventListener('click', async () => {
        const text = (finalText + (interimText ? ' ' + interimText : '')).trim();
        if(!text){ setStatus('Nulla da copiare.'); return; }
        try{
          await navigator.clipboard.writeText(text);
          setStatus('Copiato negli appunti.');
        }catch(e){
          setStatus('Impossibile copiare automaticamente. Seleziona e copia a mano.');
        }
      });

      clearBtn.addEventListener('click', () => {
        finalText = '';
        interimText = '';
        lastFinalChunk = '';
        renderOutput();
        setStatus('Pulito.');
      });

      saveBtn.addEventListener('click', () => {
        const text = (finalText + (interimText ? ' ' + interimText : '')).trim();
        const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
        const a = document.createElement('a');
        const ts = new Date().toISOString().replace(/[:.]/g,'-');
        a.href = URL.createObjectURL(blob);
        a.download = `dettatura-${ts}.txt`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus('File salvato.');
      });

      if(!SR){
        supportNote.innerHTML = '⚠️ Il tuo browser non espone il <code>Web Speech API</code>. Prova con Chrome su Android o un browser basato su Chromium. Su iOS potrebbe non funzionare.';
      } else {
        supportNote.textContent = 'Suggerimento: la dettatura continua può riavviarsi automaticamente se la sessione si chiude.';
      }
    })();
  </script>
</body>
</html>
